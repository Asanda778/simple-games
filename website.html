<!DOCTYPE html>
<html>
<head>
    <title>Simple Button Example</title>
    <script>
        function showMessage() {
            document.getElementById("output").innerHTML = "Good";
        }
    </script>
</head>
<body>
    <h1>Hellow</h1>
    <button onclick="showMessage()">Click Me</button>
    <p id="output"></p>
</body>
</html>
